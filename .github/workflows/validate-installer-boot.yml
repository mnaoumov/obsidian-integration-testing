name: Validate Installer Boot

# Downloads and extracts a real Obsidian installer on each OS AND launches it via
# connectToCdp, validating the owned-instance BOOT path end-to-end
# (obsidian-installer.ts -> transport-desktop-cdp.ts -> obsidian-instance.ts) —
# the "Tier 2" check on top of the download-only Validate Installer Path workflow.
#
# Launching Electron needs a display (xvfb on Linux; macOS/Windows runners have a
# desktop session) and, on Linux CI, the Chromium sandbox disabled — the test
# passes shouldDisableSandbox. Each run pulls a multi-hundred-MB asset and boots
# Obsidian, so it is manual-only (workflow_dispatch) rather than wired to push/PR.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer-boot:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # xvfb gives Electron a virtual display; libnss3/libgbm1/libgtk-3-0 are the
      # Chromium/Electron runtime libraries most often absent on a headless runner
      # (their package names are stable across Ubuntu releases, unlike the t64 set).
      - name: Install Linux display and Electron runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libgbm1 libgtk-3-0

      - name: Install dependencies
        run: npm ci

      - name: Validate installer boot
        env:
          OBSIDIAN_TEST_INSTALLER_BOOT: '1'
          # Authenticate the release-asset API call (avoids the anonymous 403).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          CMD="npx vitest run --project integration-tests src/obsidian-installer-boot.integration.test.ts"
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a $CMD
          else
            $CMD
          fi

      # Reproduces the Linux asar-swap version-pin bug: symlink the newer shell
      # The boot step just cached, under a *versionless* directory (so
      # detectInstalledShellVersion returns undefined), and put it on PATH BEFORE
      # vitest starts (exec.ts snapshots process.env at import). The test then
      # pins an OLDER obsidianVersion and asserts the running app is that version.
      - name: Validate Linux asar-swap version pin
        if: runner.os == 'Linux'
        env:
          OBSIDIAN_TEST_ASAR_SWAP: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          SHELL_EXE=$(ls /tmp/obsidian-integration-testing/shell-cache/*/obsidian | head -1)
          echo "Using cached shell on PATH: $SHELL_EXE"
          BIN_DIR=$(mktemp -d)
          ln -s "$SHELL_EXE" "$BIN_DIR/obsidian"
          export PATH="$BIN_DIR:$PATH"
          xvfb-run -a npx vitest run --project integration-tests src/obsidian-asar-swap.integration.test.ts
