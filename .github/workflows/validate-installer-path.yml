name: Validate Installer Path

# Downloads and extracts a real Obsidian installer on each OS to validate the
# platform-specific installer-shell provisioning path (obsidian-installer.ts):
# the Windows NSIS/7-Zip .exe, the macOS .dmg/hdiutil, and the Linux .tar.gz/tar
# branches. This is the cross-platform coverage the Windows-only local dev box
# cannot provide.
#
# The download + extract does not launch Obsidian, so no display / xvfb / sandbox
# flags are needed. Each run pulls a multi-hundred-MB asset, so it is manual-only
# (workflow_dispatch) rather than wired to push/PR.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer-path:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate installer download and extract
        env:
          OBSIDIAN_TEST_INSTALLER_DOWNLOAD: '1'
          # Authenticate the release-asset API call so the primary asset-list path
          # runs on every OS instead of hitting the anonymous 403 rate limit (which
          # forces the templated-name fallback, as seen on the macOS runner).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vitest run --project integration-tests src/obsidian-installer.integration.test.ts
